command:
- ${.:/test-executable}
copyrights:
- Copyright (C) 2026 embedded brains GmbH & Co. KG
default-timeout-in-seconds: 90.0
description: |
  Run the tests on the ${/target/arch/bsp/dummy:/name}.
discard-patterns: []
do-not-run: []
enabled-by: true
links:
- role: target
  uid: /target/arch/bsp/dummy
max-process-count: 1
max-retry-count-per-executable: 0
min-timeout-in-seconds: 10.0
name: Test Runner for the Dummy Target
params: {}
pkg-type: test-runner
test-runner-type: subprocess
timeout-scaler: 2.0
type: pkg
