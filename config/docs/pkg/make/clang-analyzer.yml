actions:
- action: remove-tree
  enabled-by: true
  missing-ok: true
  path: ${.:/params/build-directory}
- action: remove-glob
  enabled-by: true
  path: ${.:/params/working-directory}
  patterns:
  - .lock-waf*
  - .waf*
  remove-tree: true
- action: subprocess
  command:
  - scan-build
  - -o
  - ${.:/params/deployment-directory}
  - --use-cc=gcc
  - --use-c++=g++
  - ./waf
  - configure
  - --out=${.:/params/build-directory}
  - --prefix=${.:/component/build-directory}
  - --rtems-tools=${.:/component/deployment-directory}
  - --rtems-config=${.:/input/config/file}
  - --rtems-specs=${.:/input/build-spec/directory}/spec/build
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/working-directory}
- action: subprocess
  command:
  - scan-build
  - -o
  - ${.:/params/deployment-directory}
  - --use-cc=gcc
  - --use-c++=g++
  - ./waf
  - build
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/params/working-directory}
- action: remove-tree
  enabled-by: true
  missing-ok: false
  path: ${.:/params/build-directory}
- action: remove-glob
  enabled-by: true
  path: ${.:/params/working-directory}
  patterns:
  - .lock-waf*
  - .waf*
  remove-tree: true
copyrights:
- Copyright (C) 2020 EDISOFT
- Copyright (C) 2023 embedded brains GmbH & Co. KG
enabled-by: true
links: []
params:
  build-directory: ${.:/component/build-directory}/clang-analyzer
  deployment-directory: ${.:/output/deployment/directory}
  working-directory: ${../source/rtems:/directory}
pkg-type: run-actions
type: pkg
