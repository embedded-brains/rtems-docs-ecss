do-build: |
  bld.install_as("${BSP_LIBDIR}/linkcmds.gcov", "linkcmds.gcov")
do-configure: |
  from waflib import Context

  # Obtain the default linker script
  out = conf.cmd_and_log([conf.env.LD[0], "--verbose"],
                         output=Context.STDOUT,
                         quiet=Context.BOTH)

  content = f"""
  {out.split('==================================================')[1]}
  SECTIONS {{
    .rtemsroset     :
    {{
      KEEP (*(SORT(.rtemsroset.*)))
    }}
  }}
  """
  f = conf.bldnode.make_node(
      conf.env.VARIANT + "/linkcmds.gcov"
  )
  f.parent.mkdir()
  f.write(content)
  conf.env.append_value("cfg_files", f.abspath())
enabled-by: RTEMS_GCOV_COVERAGE
links: []
prepare-build: null
prepare-configure: null
type: build
