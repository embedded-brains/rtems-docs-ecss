actions:
- action: directory-state-discard-and-clear
  enabled-by: true
  output-name: build
- action: mkdir
  enabled-by: true
  exist-ok: true
  parents: true
  path: ${.:/output/tagfile/file:dirname}
- action: subprocess
  command:
  - ${.:/component/deployment-directory}/bin/doxygen
  - ${.:/input/config/file}
  enabled-by: true
  env: []
  expected-return-code: 0
  working-directory: ${.:/input/config/directory}
